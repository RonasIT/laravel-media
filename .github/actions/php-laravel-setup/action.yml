name: PHP Laravel setup
description: Setup PHP and install dependencies for selected Laravel versions

inputs:
  php-version:
    description: PHP version for the job
    required: true
  laravel-version:
    description: Laravel framework version constraint
    required: true
  coverage:
    description: Coverage driver passed to setup-php
    required: false
    default: none

runs:
  using: composite
  steps:
    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ inputs.php-version }}
        coverage: ${{ inputs.coverage }}
        tools: composer

    - name: Set up PostgreSQL
      shell: bash
      run: |
        sudo apt-get update 
        sudo apt-get install -y postgresql-client
        psql --version

    - name: Wait for PostgreSQL
      shell: bash
      run: |
        echo "Waiting for PostgreSQL to be ready..."
        for i in {1..30}; do
          if pg_isready -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USERNAME" -d "$DB_DATABASE"; then
            echo "PostgreSQL is ready"
            exit 0
          fi
          echo "Waiting for PostgreSQL..."
          sleep 2
        done
        echo "PostgreSQL failed to start"
        exit 1

    - name: Install Laravel version
      shell: bash
      env:
        LARAVEL_VERSION: ${{ inputs.laravel-version }}
      run: composer require "laravel/framework:$LARAVEL_VERSION" -q --no-update

    - name: Install dependencies
      shell: bash
      run: composer update -W -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
