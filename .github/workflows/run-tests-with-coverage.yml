name: Run tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PHP_LATEST: &php-latest "8.5"
  LARAVEL_LATEST: &laravel-latest "13.*"

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: [ "8.3", "8.4", "8.5" ]
        laravel-version: [ "12.*", "13.*" ]
        exclude:
          - php-version: *php-latest
            laravel-version: *laravel-latest
    env: &db-env
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: forge
      DB_USERNAME: forge
      DB_PASSWORD: secret
    services: &postgres-service
      postgres:
        image: postgres
        env:
          POSTGRES_DB: forge
          POSTGRES_USER: forge
          POSTGRES_PASSWORD: secret
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/php-laravel-setup
        with:
          php-version: ${{ matrix.php-version }}
          laravel-version: ${{ matrix.laravel-version }}
          coverage: none
      - name: Execute unit tests via PHPUnit
        run: vendor/bin/phpunit

  tests-with-coverage:
    runs-on: ubuntu-latest
    env: *db-env
    services: *postgres-service
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/php-laravel-setup
        with:
          php-version: *php-latest
          laravel-version: *laravel-latest
          coverage: xdebug
      - name: Format code style via Pint
        run: vendor/bin/pint --test
      - name: Execute unit tests via PHPUnit with coverage
        run: vendor/bin/phpunit --coverage-clover build/logs/clover.xml
      - name: Export coverage report
        uses: actions/upload-artifact@v7
        with:
          name: clover.xml
          path: build/logs

  upload-to-coveralls:
    needs: tests-with-coverage
    runs-on: ubuntu-latest
    steps:
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
      - name: Checkout
        uses: actions/checkout@v6
      - name: Import coverage report
        uses: actions/download-artifact@v7
        with:
          name: clover.xml
          path: build/logs
      - name: Upload coverage results to Coveralls
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          composer global require php-coveralls/php-coveralls
          php-coveralls --coverage_clover=build/logs/clover.xml -v --json_path=coveralls-upload.json
